<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaStream</title>

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:#fff}
header{background:#141414;padding:15px;color:#e50914;font-size:22px;font-weight:bold;position:sticky;top:0;z-index:10}
.container{padding:20px}
input{width:100%;padding:12px;border:none;border-radius:8px;margin-bottom:15px}
.row{margin-top:20px}
.row h2{margin:10px 0}
.scroll{display:flex;overflow-x:auto;gap:10px;padding-bottom:10px}
.card{min-width:150px;background:#1c1c1c;border-radius:10px;overflow:hidden;cursor:pointer;transition:.3s}
.card:hover{transform:scale(1.06)}
.card img{width:100%;height:220px;object-fit:cover}
.card h3{font-size:12px;margin:5px}
button{background:#222;color:#fff;border:none;padding:8px;margin:5px;cursor:pointer;border-radius:5px}
.main{background:#e50914}
.hidden{display:none}
iframe{width:100%;height:400px;border:none}
.fade{animation:fade .25s ease-in}
@keyframes fade{from{opacity:0}to{opacity:1}}

.seasons, .episodes{margin-top:10px}
select{padding:8px;border-radius:6px;background:#222;color:#fff;border:none}
.episode{padding:10px;background:#1c1c1c;margin:5px 0;border-radius:8px;cursor:pointer}
.episode:hover{background:#2a2a2a}
</style>
</head>
<body>

<header>NovaStream</header>

<!-- HOME -->
<div id="home" class="container fade">
<input type="text" placeholder="Pesquisar mais de 10.000 títulos..." onkeyup="search()" id="search">

<div class="row">
<h2>🔥 Populares</h2>
<div class="scroll" id="popular"></div>
</div>

<div class="row">
<h2>🎬 Ação</h2>
<div class="scroll" id="acao"></div>
</div>

<div class="row">
<h2>🎭 Drama</h2>
<div class="scroll" id="drama"></div>
</div>

<div class="row">
<h2>👻 Terror</h2>
<div class="scroll" id="terror"></div>
</div>

<div class="row">
<h2>⭐ Favoritos</h2>
<div class="scroll" id="fav"></div>
</div>
</div>

<!-- DETAILS -->
<div id="details" class="hidden container fade">
<button onclick="back()">⬅ Voltar</button>
<h2 id="title"></h2>
<p id="desc"></p>

<div id="series"></div>

<button class="main" onclick="addFav()">⭐ Favorito</button>
<button class="main" onclick="openTrailer()">▶ Trailer HD</button>
</div>

<!-- PLAYER -->
<div id="player" class="hidden container fade">
<button onclick="closePlayer()">Fechar</button>
<iframe id="video"></iframe>
</div>

<script>

let data=[];
let current=null;
let favorites=JSON.parse(localStorage.getItem("fav")||"[]");
let page=0;

/* 🔥 CARREGAMENTO MASSIVO (10K+ ITENS VIA PAGINAÇÃO) */
async function loadData(){
 let res=await fetch(`https://api.tvmaze.com/shows?page=${page}`);
 let json=await res.json();

 let mapped=json.map(x=>({
 name:x.name,
 img:x.image?.medium||"https://via.placeholder.com/300x450",
 genre:(x.genres[0]||"drama").toLowerCase(),
 id:x.id,
 type:x.type
 }));

 data=data.concat(mapped);
 render();
 page++;
}

window.addEventListener("scroll",()=>{
 if(window.innerHeight+window.scrollY>=document.body.offsetHeight-500){
 loadData();
 }
});

function getTrailer(name){
 return `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(name + " official trailer")}`;
}

function render(){
 renderRow("popular",data);
 renderRow("acao",data.filter(x=>x.genre.includes("action")));
 renderRow("drama",data.filter(x=>x.genre.includes("drama")));
 renderRow("terror",data.filter(x=>x.genre.includes("horror")));
 renderFav();
}

function renderRow(id,list){
 let box=document.getElementById(id);
 box.innerHTML="";
 list.slice(0,40).forEach((item)=>{
 box.innerHTML+=`
 <div class="card" onclick="openDetails(${data.indexOf(item)})">
 <img src="${item.img}">
 <h3>${item.name}</h3>
 </div>`;
 });
}

function search(){
 let v=document.getElementById("search").value.toLowerCase();
 let f=data.filter(x=>x.name.toLowerCase().includes(v));
 renderRow("popular",f);
}

/* 📺 DETALHES + SÉRIES (TEMPORADAS REAIS) */
async function openDetails(i){
 current=data[i];
 document.getElementById("home").classList.add("hidden");
 document.getElementById("details").classList.remove("hidden");
 document.getElementById("title").innerText=current.name;
 document.getElementById("desc").innerText="Carregando informações...";
 document.getElementById("series").innerHTML="";

 let seasonsRes=await fetch(`https://api.tvmaze.com/shows/${current.id}/seasons`);
 let seasons=await seasonsRes.json();

 let epRes=await fetch(`https://api.tvmaze.com/shows/${current.id}/episodes`);
 let episodes=await epRes.json();

 let html=`<div class='seasons'><h3>Temporadas</h3><select onchange='loadEpisodes(this.value,${JSON.stringify(episodes).replace(/"/g,"&quot;")})'>`;
 seasons.forEach((s,i)=>{
 html+=`<option value='${s.number}'>Temporada ${s.number}</option>`;
 });
 html+=`</select></div><div id='eps'></div>`;

 document.getElementById("series").innerHTML=html;
 document.getElementById("desc").innerText="Escolhe temporada para ver episódios";

 loadEpisodes(1,episodes);
}

function loadEpisodes(season,episodes){
 let box=document.getElementById("eps");
 box.innerHTML="";

 episodes.filter(e=>e.season==season).forEach(ep=>{
 box.innerHTML+=`
 <div class='episode' onclick="alert('Trailer do episódio será aberto')">
 Ep ${ep.number} - ${ep.name}
 </div>`;
 });
}

function openTrailer(){
 document.getElementById("details").classList.add("hidden");
 document.getElementById("player").classList.remove("hidden");
 document.getElementById("video").src=getTrailer(current.name);
}

function closePlayer(){
 document.getElementById("player").classList.add("hidden");
 document.getElementById("details").classList.remove("hidden");
}

function addFav(){
 favorites.push(current);
 localStorage.setItem("fav",JSON.stringify(favorites));
 renderFav();
}

function renderFav(){
 let box=document.getElementById("fav");
 box.innerHTML="";
 favorites.forEach(f=>{
 box.innerHTML+=`
 <div class="card" onclick="openDetails(${data.indexOf(f)})">
 <img src="${f.img}">
 <h3>${f.name}</h3>
 </div>`;
 });
}

function back(){
 document.getElementById("details").classList.add("hidden");
 document.getElementById("home").classList.remove("hidden");
}

loadData();

</script>

</body>
</html>
