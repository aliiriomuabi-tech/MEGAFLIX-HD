<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaStream</title>

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:#fff}
header{background:#141414;padding:15px;color:#e50914;font-size:22px;font-weight:bold;position:sticky;top:0;z-index:10}
.container{padding:20px}
input{width:100%;padding:12px;border:none;border-radius:8px;margin-bottom:15px}
.row{margin-top:20px}
.row h2{margin:10px 0}
.scroll{display:flex;overflow-x:auto;gap:10px;padding-bottom:10px}
.card{min-width:150px;background:#1c1c1c;border-radius:10px;overflow:hidden;cursor:pointer;transition:.3s}
.card:hover{transform:scale(1.06)}
.card img{width:100%;height:220px;object-fit:cover}
.card h3{font-size:12px;margin:5px}
.hidden{display:none}
button{background:#222;color:#fff;border:none;padding:8px;margin:5px;border-radius:5px;cursor:pointer}
.main{background:#e50914}
iframe{width:100%;height:400px;border:none}
.fade{animation:fade .3s ease-in}
@keyframes fade{from{opacity:0}to{opacity:1}}

.season-select{padding:10px;background:#222;color:#fff;border:none;border-radius:6px;margin-top:10px}
.episode{padding:10px;background:#1c1c1c;margin:5px 0;border-radius:6px;cursor:pointer}
.episode:hover{background:#2a2a2a}
</style>
</head>
<body>

<header>NovaStream</header>

<div id="home" class="container fade">
<input id="search" placeholder="Pesquisar filmes e séries..." onkeyup="search()">

<div class="row">
<h2>🔥 Tendências</h2>
<div class="scroll" id="trending"></div>
</div>

<div class="row">
<h2>🎬 Filmes</h2>
<div class="scroll" id="movies"></div>
</div>

<div class="row">
<h2>📺 Séries</h2>
<div class="scroll" id="tv"></div>
</div>
</div>

<!-- DETAILS -->
<div id="details" class="container hidden fade">
<button onclick="back()">⬅ Voltar</button>
<h2 id="title"></h2>
<p id="desc"></p>
<div id="content"></div>
<button class="main" onclick="openTrailer()">▶ Trailer</button>
</div>

<!-- PLAYER -->
<div id="player" class="container hidden fade">
<button onclick="closePlayer()">Fechar</button>
<iframe id="video"></iframe>
</div>

<script>

const API_KEY = "COLOCA_AQUI_TUA_API_TMDB";
const IMG = "https://image.tmdb.org/t/p/w500";

let current=null;
let currentType=null;
let currentSeason=1;

async function loadHome(){

 let t = await fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}`);
 let data = await t.json();
 renderList("trending",data.results);

 let m = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}`);
 let movies = await m.json();
 renderList("movies",movies.results);

 let tv = await fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}`);
 let series = await tv.json();
 renderList("tv",series.results,true);
}

function renderList(id,list,isTV=false){
 let box=document.getElementById(id);
 box.innerHTML="";

 list.forEach(item=>{
 box.innerHTML+=`
 <div class="card" onclick="openDetails(${item.id},'${isTV?'tv':'movie'}')">
 <img src="${IMG+item.poster_path}">
 <h3>${item.title || item.name}</h3>
 </div>`;
 });
}

async function openDetails(id,type){
 current=id;
 currentType=type;

 document.getElementById("home").classList.add("hidden");
 document.getElementById("details").classList.remove("hidden");

 let url=`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&append_to_response=videos`;
 let res=await fetch(url);
 let data=await res.json();

 document.getElementById("title").innerText=data.title||data.name;
 document.getElementById("desc").innerText=data.overview||"Sem descrição";

 let html="";

 // SERIES
 if(type=="tv"){
 let s = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`);
 let series = await s.json();

 html+=`<select class='season-select' onchange='loadEpisodes(this.value)'>`;
 series.seasons.forEach(s=>{
 html+=`<option value='${s.season_number}'>Temporada ${s.season_number}</option>`;
 });
 html+=`</select><div id='episodes'></div>`;
 }

 document.getElementById("content").innerHTML=html;

 if(type=="tv") loadEpisodes(1);
}

async function loadEpisodes(season){
 currentSeason=season;
 let res=await fetch(`https://api.themoviedb.org/3/tv/${current}/season/${season}?api_key=${API_KEY}`);
 let data=await res.json();

 let box=document.getElementById("episodes");
 box.innerHTML="";

 data.episodes.forEach(ep=>{
 box.innerHTML+=`
 <div class='episode' onclick="playTrailer('${ep.name}')">
 Ep ${ep.episode_number} - ${ep.name}
 </div>`;
 });
}

function search(){
 let q=document.getElementById("search").value;
 if(q.length<2) return;

 fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`)
 .then(r=>r.json())
 .then(d=>renderList("trending",d.results));
}

function openTrailer(){
 playTrailer("official trailer");
}

function playTrailer(name){
 document.getElementById("details").classList.add("hidden");
 document.getElementById("player").classList.remove("hidden");
 document.getElementById("video").src=`https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(name+' trailer')}`;
}

function closePlayer(){
 document.getElementById("player").classList.add("hidden");
 document.getElementById("details").classList.remove("hidden");
}

function back(){
 document.getElementById("details").classList.add("hidden");
 document.getElementById("home").classList.remove("hidden");
}

loadHome();

</script>

</body>
</html>
